<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1040" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444" />
      <stop offset="100%" style="stop-color:#dc2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#818cf8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#34d399"/>
    </marker>
    <marker id="arrowRed" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f87171"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowCyanRev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1040" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700" letter-spacing="1">ShopSphere — System Architecture</text>
  <text x="600" y="70" text-anchor="middle" fill="#94a3b8" font-size="14">Microservices E-commerce Platform</text>

  <!-- ===== CLIENT TIER ===== -->
  <text x="80" y="115" fill="#c4b5fd" font-size="12" font-weight="600" letter-spacing="2">CLIENT TIER</text>
  <rect x="80" y="125" width="1040" height="80" rx="16" fill="#1e1b4b" fill-opacity="0.4" stroke="#4c1d95" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- React Frontend -->
  <rect x="400" y="138" width="400" height="54" rx="12" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="600" y="163" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">React Frontend</text>
  <text x="600" y="181" text-anchor="middle" fill="#e0d4ff" font-size="11">Vite + TypeScript + Tailwind + Redux Toolkit (RTK Query)  •  :3000</text>

  <!-- Arrow: Client → Gateway -->
  <line x1="600" y1="192" x2="600" y2="232" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="615" y="218" fill="#a5b4fc" font-size="10">HTTP / REST</text>

  <!-- ===== GATEWAY TIER ===== -->
  <text x="80" y="248" fill="#93c5fd" font-size="12" font-weight="600" letter-spacing="2">GATEWAY TIER</text>
  <rect x="80" y="258" width="1040" height="80" rx="16" fill="#172554" fill-opacity="0.4" stroke="#1e40af" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- API Gateway -->
  <rect x="300" y="270" width="600" height="56" rx="12" fill="url(#gatewayGrad)" filter="url(#shadow)"/>
  <text x="600" y="296" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">API Gateway</text>
  <text x="600" y="314" text-anchor="middle" fill="#bfdbfe" font-size="11">Spring Cloud Gateway  •  JWT Auth Filter  •  Route Locator  •  :8080</text>

  <!-- Arrows: Gateway → Services -->
  <line x1="365" y1="326" x2="150" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="430" y1="326" x2="290" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="500" y1="326" x2="430" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="560" y1="326" x2="570" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="326" x2="710" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="326" x2="850" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="770" y1="326" x2="990" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="835" y1="326" x2="1090" y2="418" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== SERVICE TIER ===== -->
  <text x="80" y="400" fill="#6ee7b7" font-size="12" font-weight="600" letter-spacing="2">SERVICE TIER</text>
  <rect x="80" y="410" width="1040" height="310" rx="16" fill="#052e16" fill-opacity="0.3" stroke="#166534" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Service boxes — Row 1 -->
  <!-- User Service -->
  <rect x="95" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="155" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">User</text>
  <text x="155" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="155" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Auth &amp; Profiles</text>
  <text x="155" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8083</text>

  <!-- Product Service -->
  <rect x="235" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="295" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Product</text>
  <text x="295" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="295" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Catalog &amp; Inventory</text>
  <text x="295" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8081</text>

  <!-- Order Service -->
  <rect x="375" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="435" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Order</text>
  <text x="435" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="435" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Order Processing</text>
  <text x="435" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8082</text>

  <!-- Cart Service -->
  <rect x="515" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="575" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Cart</text>
  <text x="575" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="575" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Shopping Cart</text>
  <text x="575" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8084</text>

  <!-- Payment Service -->
  <rect x="655" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="715" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Payment</text>
  <text x="715" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="715" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Transactions</text>
  <text x="715" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8085</text>

  <!-- Shipping Service -->
  <rect x="795" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="855" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Shipping</text>
  <text x="855" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="855" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Delivery Tracking</text>
  <text x="855" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8086</text>

  <!-- Notification Service -->
  <rect x="935" y="425" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="995" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Notification</text>
  <text x="995" y="470" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="995" y="490" text-anchor="middle" fill="#d1fae5" font-size="9">Alerts &amp; Messages</text>
  <text x="995" y="515" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8087</text>

  <!-- ===== FEIGN CLIENT INTER-SERVICE COMMUNICATION ===== -->
  <!-- Order → Product (Feign: get product, update stock) — curved arc above services -->
  <path d="M 435 425 C 435 390, 295 390, 295 425" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowCyan)"/>
  <!-- Label on the curve -->
  <rect x="291" y="374" width="148" height="20" rx="6" fill="#164e63" fill-opacity="0.9" stroke="#22d3ee" stroke-width="1"/>
  <text x="365" y="388" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="700">FEIGN: Get Product &amp; Update Stock</text>

  <!-- Order → Notification (Feign: send notification) — curved arc below services -->
  <path d="M 435 525 C 435 580, 995 580, 995 525" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowCyan)"/>
  <!-- Label on the curve -->
  <rect x="643" y="560" width="164" height="32" rx="6" fill="#164e63" fill-opacity="0.9" stroke="#22d3ee" stroke-width="1"/>
  <text x="725" y="573" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="700">FEIGN CLIENT</text>
  <text x="725" y="584" text-anchor="middle" fill="#67e8f9" font-size="8">Order Confirmation Notification</text>

  <!-- Review Service — row 2 centered -->
  <rect x="440" y="605" width="120" height="100" rx="10" fill="url(#serviceGrad)" filter="url(#shadowSm)"/>
  <text x="500" y="635" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Review</text>
  <text x="500" y="650" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Service</text>
  <text x="500" y="670" text-anchor="middle" fill="#d1fae5" font-size="9">Ratings &amp; Reviews</text>
  <text x="500" y="695" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">:8088</text>

  <!-- Gateway arrow to Review Service -->
  <line x1="580" y1="326" x2="500" y2="603" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-opacity="0.7"/>

  <!-- ===== DATA TIER ===== -->
  <text x="80" y="740" fill="#fcd34d" font-size="12" font-weight="600" letter-spacing="2">DATA TIER</text>
  <rect x="80" y="750" width="1040" height="210" rx="16" fill="#422006" fill-opacity="0.3" stroke="#92400e" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- MongoDB outer container — Database-per-Service -->
  <rect x="92" y="762" width="820" height="185" rx="12" fill="url(#dbGrad)" filter="url(#shadow)" fill-opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="502" y="782" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">MongoDB  :27017</text>
  <text x="502" y="796" text-anchor="middle" fill="#fbbf24" font-size="10">Database-per-Service Pattern</text>

  <!-- Row 1: 4 databases -->
  <rect x="108" y="808" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="200" y="826" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_users</text>
  <text x="200" y="842" text-anchor="middle" fill="#fde68a" font-size="8">User Service</text>

  <rect x="305" y="808" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="397" y="826" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_products</text>
  <text x="397" y="842" text-anchor="middle" fill="#fde68a" font-size="8">Product Service</text>

  <rect x="502" y="808" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="594" y="826" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_orders</text>
  <text x="594" y="842" text-anchor="middle" fill="#fde68a" font-size="8">Order Service</text>

  <rect x="699" y="808" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="791" y="826" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_carts</text>
  <text x="791" y="842" text-anchor="middle" fill="#fde68a" font-size="8">Cart Service</text>

  <!-- Row 2: 4 databases -->
  <rect x="108" y="862" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="200" y="880" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_payments</text>
  <text x="200" y="896" text-anchor="middle" fill="#fde68a" font-size="8">Payment Service</text>

  <rect x="305" y="862" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="397" y="880" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_shipping</text>
  <text x="397" y="896" text-anchor="middle" fill="#fde68a" font-size="8">Shipping Service</text>

  <rect x="502" y="862" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="594" y="880" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_notifications</text>
  <text x="594" y="896" text-anchor="middle" fill="#fde68a" font-size="8">Notification Service</text>

  <rect x="699" y="862" width="185" height="42" rx="8" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <text x="791" y="880" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">shopsphere_reviews</text>
  <text x="791" y="896" text-anchor="middle" fill="#fde68a" font-size="8">Review Service</text>

  <!-- Arrows from services to their individual databases -->
  <!-- User Service → shopsphere_users -->
  <line x1="155" y1="525" x2="200" y2="806" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Product Service → shopsphere_products -->
  <line x1="295" y1="525" x2="397" y2="806" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Order Service → shopsphere_orders -->
  <line x1="435" y1="525" x2="594" y2="806" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Cart Service → shopsphere_carts -->
  <line x1="575" y1="525" x2="791" y2="806" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Payment Service → shopsphere_payments -->
  <line x1="715" y1="525" x2="200" y2="860" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Shipping Service → shopsphere_shipping -->
  <line x1="855" y1="525" x2="397" y2="860" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Notification Service → shopsphere_notifications -->
  <line x1="995" y1="525" x2="594" y2="860" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <!-- Review Service → shopsphere_reviews -->
  <line x1="500" y1="705" x2="791" y2="860" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>

  <!-- Redis -->
  <rect x="930" y="808" width="175" height="96" rx="12" fill="url(#redisGrad)" filter="url(#shadow)"/>
  <text x="1017" y="848" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Redis</text>
  <text x="1017" y="866" text-anchor="middle" fill="#fee2e2" font-size="9">Caching &amp; Sessions</text>
  <text x="1017" y="880" text-anchor="middle" fill="#fecaca" font-size="9">:6379</text>

  <!-- Cart → Redis -->
  <line x1="600" y1="525" x2="1017" y2="806" stroke="#f87171" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="80" y="975" width="1040" height="50" rx="10" fill="#0f172a" fill-opacity="0.6" stroke="#334155" stroke-width="1"/>
  <text x="100" y="1005" fill="#94a3b8" font-size="11" font-weight="600">TECH STACK:</text>

  <rect x="195" y="997" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="211" y="1007" fill="#c4b5fd" font-size="10">React + Vite + TS</text>

  <rect x="330" y="997" width="10" height="10" rx="2" fill="#3b82f6"/>
  <text x="346" y="1007" fill="#93c5fd" font-size="10">Spring Cloud Gateway</text>

  <rect x="490" y="997" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="506" y="1007" fill="#6ee7b7" font-size="10">Spring Boot 3.2</text>

  <rect x="620" y="997" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="636" y="1007" fill="#fcd34d" font-size="10">MongoDB (per-service)</text>

  <rect x="775" y="997" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="791" y="1007" fill="#fca5a5" font-size="10">Redis</text>

  <rect x="840" y="997" width="10" height="10" rx="2" fill="#64748b"/>
  <text x="856" y="1007" fill="#94a3b8" font-size="10">JWT Auth</text>

  <!-- Feign legend item -->
  <line x1="925" y1="1002" x2="955" y2="1002" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="963" y="1007" fill="#67e8f9" font-size="10">OpenFeign (Inter-service)</text>
</svg>